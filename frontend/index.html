<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>Motivational Shorts Creator</title>
  <meta
    name="description"
    content="Generate powerful, 55–60 second motivational scripts for YouTube Shorts."
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>🎬 Motivational Shorts Creator</h1>
    <p class="subtitle">
      Generate powerful motivational scripts for YouTube Shorts (55–60 seconds)
    </p>

    <div class="input-group">
      <label for="topic">Enter your topic or keyword:</label>
      <input
        type="text"
        id="topic"
        placeholder="e.g., overcoming fear, success mindset, daily discipline"
        autocomplete="off"
        enterkeyhint="go"
        maxlength="80"
        required
      />
      <button id="generateBtn" type="button">✨ Generate Script</button>
    </div>

    <div id="loading" class="loading hidden" aria-live="polite" aria-busy="true">
      <div class="spinner"></div>
      <p>Generating your motivational script...</p>
    </div>

    <div id="result" class="result hidden" aria-live="polite">
      <div class="script-box">
        <h3>📝 Motivational Script</h3>
        <p id="scriptText"></p>
        <p id="wordCount" style="font-size: 12px; color: #feca57; margin-top: 10px;"></p>
        <button id="copyScriptBtn" class="copy-btn" type="button">📋 Copy Script</button>
      </div>

      <div class="youtube-box">
        <h3>📺 A/B Test Titles (Pick Best One)</h3>

        <div class="field ab-title">
          <label>🎯 Title A:</label>
          <p id="titleAText"></p>
          <button id="copyTitleABtn" class="small-copy" type="button">Copy</button>
        </div>

        <div class="field ab-title">
          <label>🔥 Title B:</label>
          <p id="titleBText"></p>
          <button id="copyTitleBBtn" class="small-copy" type="button">Copy</button>
        </div>

        <div class="field ab-title">
          <label>⚡ Title C:</label>
          <p id="titleCText"></p>
          <button id="copyTitleCBtn" class="small-copy" type="button">Copy</button>
        </div>

        <div class="field">
          <label>📝 Description:</label>
          <p id="descriptionText"></p>
          <button id="copyDescBtn" class="small-copy" type="button">Copy</button>
        </div>

        <div class="field">
          <label>🏷️ Hashtags:</label>
          <p id="hashtagsText"></p>
          <button id="copyHashtagsBtn" class="small-copy" type="button">Copy</button>
        </div>
      </div>
    </div>
  </main>

  <noscript>
    <p style="padding:1rem; text-align:center;">This app requires JavaScript to run.</p>
  </noscript>

  <script src="script.js"></script>
</body>
            </html>
