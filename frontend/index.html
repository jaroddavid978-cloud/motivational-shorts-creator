<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motivational Shorts Creator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎬 Motivational Shorts Creator</h1>
        <p class="subtitle">Generate powerful motivational scripts for YouTube Shorts (55-60 seconds)</p>

        <div class="input-group">
            <label for="topic">Enter your topic or keyword:</label>
            <input type="text" id="topic" placeholder="e.g., overcoming fear, success mindset, daily discipline" />
            <button id="generateBtn">✨ Generate Script</button>
        </div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Generating your motivational script...</p>
        </div>

        <div id="result" class="result hidden">
            <div class="script-box">
                <h3>📝 Motivational Script</h3>
                <p id="scriptText"></p>
                <button id="copyScriptBtn" class="copy-btn">📋 Copy Script</button>
            </div>

            <div class="youtube-box">
                <h3>📺 YouTube Shorts Package</h3>
                <div class="field">
                    <label>🎯 Title:</label>
                    <p id="titleText"></p>
                    <button id="copyTitleBtn" class="small-copy">Copy</button>
                </div>
                <div class="field">
                    <label>📝 Description:</label>
                    <p id="descriptionText"></p>
                    <button id="copyDescBtn" class="small-copy">Copy</button>
                </div>
                <div class="field">
                    <label>🏷️ Hashtags:</label>
                    <p id="hashtagsText"></p>
                    <button id="copyHashtagsBtn" class="small-copy">Copy</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
  </html>
